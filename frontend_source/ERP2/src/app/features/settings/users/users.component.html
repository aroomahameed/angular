<div class="subheader">
  <h1 class="subheader-title">
    <i class="fal fa-users-cog"></i>
    Users
  </h1>
</div>

<div class="panel">
  <div class="panel-hdr">
    <h2>User Accounts</h2>
  </div>
  <div class="panel-container show">
    <div class="panel-content">
      <alert *ngIf="saved" type="success" [dismissible]="true">User saved.</alert>
      <alert *ngIf="error" type="danger" [dismissible]="true">{{ error }}</alert>

      <div class="users-toolbar">
        <span class="text-muted">Create login accounts and assign a base role.</span>
        <button class="btn btn-sm btn-primary" type="button" (click)="addUser()">Add User</button>
      </div>

      <form *ngIf="formVisible" class="border rounded p-3 mb-4" (ngSubmit)="saveUser()">
        <div class="user-form-grid">
          <div class="form-group">
            <label>Username</label>
            <input class="form-control" name="username" [(ngModel)]="form.username" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input class="form-control" name="password" type="password" [(ngModel)]="form.password" [required]="!form.id">
          </div>
          <div class="form-group">
            <label>Name</label>
            <input class="form-control" name="name" [(ngModel)]="form.name" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input class="form-control" name="email" type="email" [(ngModel)]="form.email" required>
          </div>
          <div class="form-group">
            <label>Role</label>
            <select class="form-control" name="role" [(ngModel)]="form.role">
              <option value="user">User</option>
              <option value="admin">Admin</option>
              <option value="super_admin">Super Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <div class="custom-control custom-checkbox mt-2">
              <input id="userStatus" class="custom-control-input" type="checkbox" name="status" [(ngModel)]="form.status">
              <label class="custom-control-label" for="userStatus">Active</label>
            </div>
          </div>
        </div>
        <div class="mt-2">
          <button class="btn btn-primary mr-2" type="submit" [disabled]="saving">{{ saving ? 'Saving...' : 'Save User' }}</button>
          <button class="btn btn-secondary" type="button" (click)="cancel()">Cancel</button>
        </div>
      </form>

      <div class="table-responsive">
        <table class="table table-bordered table-hover">
          <thead>
            <tr>
              <th>Username</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th style="width: 150px;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of users">
              <td>{{ user.username }}</td>
              <td>{{ user.name }}</td>
              <td>{{ user.email }}</td>
              <td>{{ user.role }}</td>
              <td>{{ user.status ? 'Active' : 'Inactive' }}</td>
              <td>
                <button class="btn btn-xs btn-outline-primary mr-1" type="button" (click)="editUser(user)">Edit</button>
                <button class="btn btn-xs btn-outline-danger" type="button" (click)="deleteUser(user)">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
